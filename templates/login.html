<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>登录 - UniScan目标检测平台</title>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body {
            font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', 'PingFang SC', 'Microsoft YaHei', sans-serif;
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
            min-height: 100vh;
            display: flex;
            align-items: center;
            justify-content: center;
        }

        .login-container {
            width: 100%;
            max-width: 420px;
            padding: 20px;
        }

        .login-card {
            background: #ffffff;
            border-radius: 16px;
            box-shadow: 0 20px 60px rgba(0, 0, 0, 0.15);
            padding: 48px 40px;
        }

        .login-header {
            text-align: center;
            margin-bottom: 40px;
        }

        .system-logo {
            width: 64px;
            height: 64px;
            background: linear-gradient(135deg, #2D5BFF 0%, #6B8CFF 100%);
            border-radius: 16px;
            display: inline-flex;
            align-items: center;
            justify-content: center;
            margin-bottom: 20px;
        }

        .system-logo svg {
            width: 36px;
            height: 36px;
            fill: #ffffff;
        }

        .system-name {
            font-size: 24px;
            font-weight: 600;
            color: #1a1a2e;
            margin-bottom: 8px;
        }

        .system-desc {
            font-size: 14px;
            color: #6b7280;
        }

        .form-group {
            margin-bottom: 24px;
        }

        .form-label {
            display: block;
            font-size: 14px;
            font-weight: 500;
            color: #374151;
            margin-bottom: 8px;
        }

        .form-input {
            width: 100%;
            height: 48px;
            padding: 0 16px;
            border: 2px solid #e5e7eb;
            border-radius: 10px;
            font-size: 15px;
            color: #1f2937;
            transition: all 0.2s ease;
            outline: none;
        }

        .form-input:focus {
            border-color: #2D5BFF;
            box-shadow: 0 0 0 4px rgba(45, 91, 255, 0.1);
        }

        .form-input.error {
            border-color: #ef4444;
        }

        .form-input::placeholder {
            color: #9ca3af;
        }

        .error-message {
            display: none;
            margin-top: 8px;
            padding: 12px 16px;
            background: #fef2f2;
            border: 1px solid #fee2e2;
            border-radius: 8px;
            color: #dc2626;
            font-size: 14px;
        }

        .error-message.show {
            display: flex;
            align-items: center;
            gap: 8px;
        }

        .error-message svg {
            width: 18px;
            height: 18px;
            flex-shrink: 0;
        }

        .login-btn {
            width: 100%;
            height: 50px;
            background: #2D5BFF;
            border: none;
            border-radius: 10px;
            color: #ffffff;
            font-size: 16px;
            font-weight: 500;
            cursor: pointer;
            transition: all 0.2s ease;
            margin-top: 8px;
        }

        .login-btn:hover {
            background: #1a47e8;
            transform: translateY(-1px);
            box-shadow: 0 8px 20px rgba(45, 91, 255, 0.35);
        }

        .login-btn:active {
            transform: translateY(0);
        }

        .login-btn:disabled {
            background: #9ca3af;
            cursor: not-allowed;
            transform: none;
            box-shadow: none;
        }

        .login-btn.loading {
            position: relative;
            color: transparent;
        }

        .login-btn.loading::after {
            content: '';
            position: absolute;
            width: 20px;
            height: 20px;
            top: 50%;
            left: 50%;
            margin-left: -10px;
            margin-top: -10px;
            border: 2px solid #ffffff;
            border-radius: 50%;
            border-top-color: transparent;
            animation: spin 0.8s linear infinite;
        }

        @keyframes spin {
            to {
                transform: rotate(360deg);
            }
        }

        .footer-text {
            text-align: center;
            margin-top: 32px;
            font-size: 13px;
            color: #9ca3af;
        }
    </style>
</head>
<body>
    <div class="login-container">
        <div class="login-card">
            <div class="login-header">
                <div class="system-logo">
                    <svg viewBox="0 0 24 24" xmlns="http://www.w3.org/2000/svg">
                        <path d="M12 2C6.48 2 2 6.48 2 12s4.48 10 10 10 10-4.48 10-10S17.52 2 12 2zm-1 17.93c-3.95-.49-7-3.85-7-7.93 0-.62.08-1.21.21-1.79L9 15v1c0 1.1.9 2 2 2v1.93zm6.9-2.54c-.26-.81-1-1.39-1.9-1.39h-1v-3c0-.55-.45-1-1-1H8v-2h2c.55 0 1-.45 1-1V7h2c1.1 0 2-.9 2-2v-.41c2.93 1.19 5 4.06 5 7.41 0 2.08-.8 3.97-2.1 5.39z"/>
                    </svg>
                </div>
                <h1 class="system-name">UniScan目标检测平台</h1>
                <p class="system-desc">智能目标检测与分析系统</p>
            </div>

            <form id="loginForm" novalidate>
                <div class="form-group">
                    <label class="form-label" for="username">用户名</label>
                    <input
                        type="text"
                        id="username"
                        name="username"
                        class="form-input"
                        placeholder="请输入用户名"
                        autocomplete="username"
                        required
                    >
                </div>

                <div class="form-group">
                    <label class="form-label" for="password">密码</label>
                    <input
                        type="password"
                        id="password"
                        name="password"
                        class="form-input"
                        placeholder="请输入密码"
                        autocomplete="current-password"
                        required
                    >
                </div>

                <div id="errorMessage" class="error-message">
                    <svg viewBox="0 0 24 24" fill="currentColor">
                        <path d="M12 2C6.48 2 2 6.48 2 12s4.48 10 10 10 10-4.48 10-10S17.52 2 12 2zm1 15h-2v-2h2v2zm0-4h-2V7h2v6z"/>
                    </svg>
                    <span id="errorText"></span>
                </div>

                <button type="submit" id="loginBtn" class="login-btn">登 录</button>
            </form>

            <p class="footer-text">© 2026 UniScan. All rights reserved.</p>
        </div>
    </div>

    <script>
        const loginForm = document.getElementById('loginForm');
        const usernameInput = document.getElementById('username');
        const passwordInput = document.getElementById('password');
        const loginBtn = document.getElementById('loginBtn');
        const errorMessage = document.getElementById('errorMessage');
        const errorText = document.getElementById('errorText');

        function showError(message) {
            errorText.textContent = message;
            errorMessage.classList.add('show');
        }

        function hideError() {
            errorMessage.classList.remove('show');
            usernameInput.classList.remove('error');
            passwordInput.classList.remove('error');
        }

        function validateForm() {
            hideError();

            if (!usernameInput.value.trim()) {
                usernameInput.classList.add('error');
                showError('请输入用户名');
                usernameInput.focus();
                return false;
            }

            if (!passwordInput.value) {
                passwordInput.classList.add('error');
                showError('请输入密码');
                passwordInput.focus();
                return false;
            }

            if (usernameInput.value.trim().length < 2) {
                usernameInput.classList.add('error');
                showError('用户名长度不能少于2个字符');
                usernameInput.focus();
                return false;
            }

            if (passwordInput.value.length < 6) {
                passwordInput.classList.add('error');
                showError('密码长度不能少于6个字符');
                passwordInput.focus();
                return false;
            }

            return true;
        }

        function setLoading(loading) {
            if (loading) {
                loginBtn.classList.add('loading');
                loginBtn.disabled = true;
            } else {
                loginBtn.classList.remove('loading');
                loginBtn.disabled = false;
            }
        }

        async function handleLogin(e) {
            e.preventDefault();

            if (!validateForm()) {
                return;
            }

            setLoading(true);
            hideError();

            try {
                const response = await fetch('/api/v1/auth/login', {
                    method: 'POST',
                    headers: {
                        'Content-Type': 'application/json'
                    },
                    credentials: 'same-origin',  // 确保发送 cookie
                    body: JSON.stringify({
                        username: usernameInput.value.trim(),
                        password: passwordInput.value
                    })
                });

                const data = await response.json();
                console.log('Login response:', data);

                if (data.code === 200) {
                    // 登录成功，强制页面刷新到首页
                    window.location.replace('/');
                } else {
                    showError(data.message || '登录失败，请检查用户名和密码');
                }
            } catch (error) {
                console.error('Login error:', error);
                showError('网络错误，请稍后重试');
            } finally {
                setLoading(false);
            }
        }

        loginForm.addEventListener('submit', handleLogin);

        usernameInput.addEventListener('input', hideError);
        passwordInput.addEventListener('input', hideError);

        document.addEventListener('keydown', function(e) {
            if (e.key === 'Enter' && document.activeElement.tagName !== 'BUTTON') {
                loginForm.dispatchEvent(new Event('submit', { cancelable: true }));
            }
        });
    </script>
</body>
</html>
